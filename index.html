<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --border: #e8e2d9;
      --text: #1a1714;
      --muted: #8a8076;
      --accent: #c8603a;
      --accent-light: #f5ede8;
      --latest-bg: #1a1714;
      --latest-text: #faf8f4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
    }

    header {
      max-width: 640px;
      margin: 0 auto 3.5rem;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
    }

    .count {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      width: 100%;
    }

    .grid {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.25rem 1rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(200, 96, 58, 0.08);
      transform: translateX(2px);
    }

    .card:hover::before { background: var(--accent); }

    .card--latest {
      background: var(--latest-bg);
      border-color: var(--latest-bg);
      color: var(--latest-text);
    }

    .card--latest:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    .card-header {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 1.2rem;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--accent);
      color: white;
      padding: 0.15em 0.5em;
      border-radius: 3px;
    }

    .label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
    }

    .card--latest .label { color: #a09890; }

    .card-title {
      grid-column: 1;
      grid-row: 2;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.3;
    }

    .card-arrow {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      font-size: 1.1rem;
      color: var(--muted);
      transition: transform 0.15s, color 0.15s;
    }

    .card:hover .card-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .card--latest .card-arrow { color: #a09890; }
    .card--latest:hover .card-arrow { color: var(--accent); }

    .empty {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 6px;
      line-height: 2;
    }

    .empty code {
      font-size: 0.85rem;
      background: var(--border);
      padding: 0.1em 0.4em;
      border-radius: 3px;
    }

    footer {
      max-width: 640px;
      margin: 3rem auto 0;
      font-size: 0.75rem;
      color: var(--border);
      text-align: center;
    }
  </style>
</head>
