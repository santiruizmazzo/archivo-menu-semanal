name: Generar index y deployar

on:
  push:
    branches:
      - main

# Permisos necesarios para GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar index.html
        run: node generate-index.js

      - name: Commitear el index.html generado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: regenerar index.html [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
          exclude: |
            .github
            generate-index.js
            README.md

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
